services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: search
      POSTGRES_PASSWORD: search
      POSTGRES_DB: search
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U search -d search']
      interval: 5s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      ES_JAVA_OPTS: '-Xms512m -Xmx512m'
    ports:
      - '9200:9200'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "curl -sf 'http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=1s' || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: api
      DATABASE_URL: postgresql://search:search@postgres:5432/search?schema=public
      ELASTICSEARCH_NODE: http://elasticsearch:9200
      ELASTICSEARCH_PRODUCT_INDEX: products
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_TTL_SECONDS: 60
      SEARCH_MAX_PAGE_SIZE: 100
      AUTOCOMPLETE_MAX_SUGGESTIONS: 10
      SEED_PRODUCT_COUNT: 500
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  elasticsearch_data:
